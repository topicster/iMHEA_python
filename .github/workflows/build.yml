name: Build desktop apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[gui,dev]"
      - run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0
      - run: python -m pytest tests/ -q
        env:
          QT_QPA_PLATFORM: offscreen

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: iMHEA-Data-Processor-windows
            path: dist/iMHEA-Data-Processor
          - os: macos-latest        # Apple Silicon
            artifact: iMHEA-Data-Processor-macos-arm64
            path: "dist/iMHEA Data Processor.app"
          - os: macos-13            # Intel
            artifact: iMHEA-Data-Processor-macos-intel
            path: "dist/iMHEA Data Processor.app"
          - os: ubuntu-latest
            artifact: iMHEA-Data-Processor-linux
            path: dist/iMHEA-Data-Processor
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[build]"
      - run: pyinstaller packaging/imhea_gui.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          cd artifacts
          for d in */; do (cd "$d" && zip -qr "../${d%/}.zip" .); done
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
